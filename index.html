<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="ASCII landing page for Shreshth Saride, Co-Founder @ Basics."
    />
    <title>Shreshth Saride</title>
    <link rel="icon" type="image/x-icon" href="./favicon.ico" />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="./favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="./favicon-16x16.png" />
    <link rel="apple-touch-icon" href="./apple-touch-icon.png" />
    <link rel="manifest" href="./site.webmanifest" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&family=Unica+One&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css?v=motion-10" />
  </head>
  <body>
    <canvas id="ascii-field" aria-hidden="true"></canvas>
    <video
      id="source-footage"
      class="source-footage"
      autoplay
      muted
      playsinline
      preload="auto"
      poster="./media/gaming-ascii-game-poster.jpg?v=game-links-3"
      aria-hidden="true"
      tabindex="-1"
    >
      <source src="./media/gaming-ascii-game-intro-sampled.mp4?v=motion-3" type="video/mp4" />
    </video>
    <video
      id="loop-footage"
      class="source-footage"
      muted
      loop
      playsinline
      preload="metadata"
      aria-hidden="true"
      tabindex="-1"
    >
      <source src="./media/gaming-ascii-game-loop-sampled.mp4?v=motion-3" type="video/mp4" />
    </video>
    <div class="vignette" aria-hidden="true"></div>
    <div class="scanline" aria-hidden="true"></div>
    <div data-transition-wrap class="transition" aria-hidden="true">
      <div data-transition-panel class="transition__panel">
        <div data-transition-col class="transition__col">
          <div data-transition-pixel class="transition__pixel"></div>
        </div>
      </div>
    </div>

    <main class="stage" aria-labelledby="hero-title">
      <section class="identity" data-ready-item>
        <h1 id="hero-title" aria-label="Shreshth Saride">
          <span class="typewriter" aria-hidden="true">Shreshth Saride</span>
        </h1>
        <p class="role-line">Co-Founder @ Basics</p>
        <div class="identity-links" aria-label="Social links">
          <a
            class="social-link"
            href="https://www.linkedin.com/in/shreshthsaride/"
            target="_blank"
            rel="noreferrer"
            aria-label="LinkedIn profile"
          >
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path
                d="M20.45 20.45h-3.56v-5.57c0-1.33-.02-3.04-1.85-3.04-1.85 0-2.14 1.45-2.14 2.95v5.66H9.34V8.99h3.42v1.56h.05c.48-.9 1.64-1.85 3.38-1.85 3.61 0 4.28 2.38 4.28 5.47v6.28h-.02ZM5.32 7.42a2.06 2.06 0 1 1 0-4.12 2.06 2.06 0 0 1 0 4.12ZM3.54 20.45H7.1V8.99H3.54v11.46Z"
              />
            </svg>
          </a>
          <a
            class="social-link"
            href="https://x.com/shreshthsaride"
            target="_blank"
            rel="noreferrer"
            aria-label="X profile"
          >
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M18.14 2.84h3.27l-7.14 8.16 8.4 11.1h-6.58l-5.15-6.73-5.9 6.73H1.76l7.64-8.74L1.34 2.84h6.75l4.65 6.15 5.4-6.15Zm-1.15 17.31h1.81L7.1 4.69H5.16l11.83 15.46Z" />
            </svg>
          </a>
        </div>
        <div class="identity-actions" data-action-reveal>
          <a class="learn-more-button" href="./about.html" data-learn-more tabindex="-1" aria-hidden="true">
            <span class="learn-more-label">Learn More</span>
            <span class="learn-more-pixels" aria-hidden="true"></span>
          </a>
        </div>
      </section>
    </main>

    <button class="field-control" type="button" aria-label="Pause background animation">
      <span aria-hidden="true">⌁</span>
    </button>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.15/dist/gsap.min.js" defer></script>
    <script src="./backdrop.js?v=motion-3" defer></script>
  </body>
</html>
